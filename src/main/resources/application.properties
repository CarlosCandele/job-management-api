# Conexão com banco de dados PostgreSQL (Docker)
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
server.port=${PORT:8080}


# JPA e Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true 
spring.jpa.properties.hibernate.format_sql=true

# Token JWT ou outro segredo de segurança
security.token.secret=${JWT_SECRET}
security.token.secret.candidate=${JWT_SECRET_CANDIDATE}

token.sonar = sqp_713f93552331d3fa9b0f5569ccc0f821ca2acec9

management.endpoints.web.discovery.enabled=false
management.endpoints.web.exposure.include=health,metrics,prometheus
management.endpoint.health.probes.enabled=true
management.endpoint.health.show-details=always



